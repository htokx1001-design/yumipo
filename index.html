<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>酒いくらメーター</title>
<meta name="apple-mobile-web-app-title" content="酒いくら？">
<link rel="apple-touch-icon" href="icon.png">

<style>

:root{
--bg:#ffd9e6;
--card:#fffafc;
--text:#4a2a35;
--accent:#ff4f87;
--accent2:#ff8a3d;
}

body{
margin:0;
padding:14px;
background:linear-gradient(180deg,#ffd9e6,#ffcfe0);
font-family:
"Hiragino Maru Gothic ProN",
"Hiragino Sans",
-apple-system,
BlinkMacSystemFont,
sans-serif;
}

.wrap{
max-width:560px;
margin:auto;
}

h1{
text-align:center;
margin:6px 0 0;
font-size:30px;
color:#d5336c;
text-shadow:
0 2px 0 rgba(255,255,255,0.7),
0 4px 6px rgba(0,0,0,0.15);
}

.subtitle{
text-align:center;
font-size:14px;
color:#9b5a72;
margin-bottom:10px;
}

.card{
background:var(--card);
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 5px 12px rgba(0,0,0,0.1);
}

label{
font-weight:700;
font-size:14px;
display:block;
margin-bottom:4px;
}

select,input,button{
width:100%;
padding:12px;
font-size:16px;
border-radius:12px;
margin-bottom:10px;
box-sizing:border-box;
}

select,input{
border:2px solid #f1bfd0;
}

button{
border:none;
background:var(--accent);
color:white;
font-weight:900;
}

button:active{
transform:scale(.98);
}

.main{
text-align:center;
font-size:24px;
font-weight:900;
color:var(--accent2);
margin:10px 0;
}

.comment{
text-align:center;
font-size:20px;
font-weight:900;
margin:8px 0;
}

.update{
text-align:center;
font-size:18px;
color:#d93a6a;
font-weight:900;
}

.divider{
height:1px;
background:#f3bfd0;
margin:8px 0;
}

.small{
font-size:15px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="wrap">

<h1>🍺 酒いくらメーター 🍋</h1>
<div class="subtitle">〜 ロングは敵か味方か 〜</div>

<div class="card">

<label>スーパー</label>
<select id="store"></select>

<label>種類</label>
<select id="category"></select>

<div id="itemWrap">
<label>味 / 商品</label>
<select id="item"></select>
</div>

<label>価格表示</label>
<select id="tax">
<option value="in">税込</option>
<option value="ex">税抜</option>
</select>

<div id="p350wrap">
<label>350の価格</label>
<input id="p350" type="number" placeholder="108">
</div>

<div id="p500wrap">
<label>ロング価格（任意）</label>
<input id="p500" type="number" placeholder="145">
</div>

<div id="panywrap" class="hidden">
<label>価格</label>
<input id="pany" type="number">
</div>

<button onclick="run()">計算 / 保存</button>

</div>

<div class="card">
<div id="result">ここに結果がでます。</div>
</div>

</div>

<script>

const stores=["サンプラ","ライフ","ドンキ","ベス","万代","油甚","サンディ","コープ"]

const categories={
"ほんしぼ":{mode:"compare",items:["グレフル","レモン","Pグレフル","オレンジ","その他"]},
"氷結":{mode:"compare",items:["グレフル","レモン","ゆず","シャルドネ","その他"]},
"-196":{mode:"compare",items:["レモン","Sマスカット","ラフランス","Vオレンジ","Pグレフル","その他"]},
"ドライ":{mode:"compare",items:[]},
"その他":{mode:"compareOnly",items:[]},
"わるやつ":{mode:"saveOnly",items:["濃いめのグレフル1.8L","タコハイ500ml","氷彩500ml","ウォッカ"]}
}

const longWin=[
"🍻 ロングいけ！",
"🍺 今日はロングの日！",
"💪 ロング、強し！",
"😏 もうそれロングでええやん！"
]

const shortWin=[
"🍋 今日はショート！",
"🍋 まだ350が粘る！",
"🍺 ロング、まだ早い！",
"🏆 今回はちび缶勝利！"
]

const draw=[
"🤝 ほぼ互角！",
"🤔 どっちでもええやん！",
"😅 好きな方でどうぞ！",
"🪙 コイントス案件！"
]

const storeEl=document.getElementById("store")
const catEl=document.getElementById("category")
const itemEl=document.getElementById("item")
const itemWrap=document.getElementById("itemWrap")
const p350=document.getElementById("p350")
const p500=document.getElementById("p500")
const pany=document.getElementById("pany")
const p350wrap=document.getElementById("p350wrap")
const p500wrap=document.getElementById("p500wrap")
const panywrap=document.getElementById("panywrap")
const tax=document.getElementById("tax")

stores.forEach(s=>{
storeEl.innerHTML+=`<option>${s}</option>`
})

Object.keys(categories).forEach(c=>{
catEl.innerHTML+=`<option>${c}</option>`
})

function updateItems(){
let c=catEl.value
let items=categories[c].items

if(items.length==0){
itemWrap.classList.add("hidden")
itemEl.innerHTML=""
}else{
itemWrap.classList.remove("hidden")
itemEl.innerHTML=""
items.forEach(i=>{
itemEl.innerHTML+=`<option>${i}</option>`
})
}

if(categories[c].mode=="saveOnly"){
p350wrap.classList.add("hidden")
p500wrap.classList.add("hidden")
panywrap.classList.remove("hidden")
}else{
p350wrap.classList.remove("hidden")
p500wrap.classList.remove("hidden")
panywrap.classList.add("hidden")
}
}

catEl.onchange=updateItems
updateItems()

function taxIn(v){
if(tax.value=="in") return v
return v*1.1
}

function rand(a){
return a[Math.floor(Math.random()*a.length)]
}

function run(){

let store=storeEl.value
let cat=catEl.value
let item=itemEl.value||""
let mode=categories[cat].mode

if(mode=="saveOnly"){

let price=taxIn(parseFloat(pany.value))
if(!price) return

let key=cat+"_"+item
let data=JSON.parse(localStorage.getItem(key)||"{}")

let newMin=false

if(!data.min || price<data.min){
data.min=price
data.minStore=store
newMin=true
}

if(!data.max || price>data.max){
data.max=price
data.maxStore=store
}

localStorage.setItem(key,JSON.stringify(data))

document.getElementById("result").innerHTML=`
<div class="small">${store} / ${cat} / ${item}</div>
<div class="divider"></div>
<div class="main">${price.toFixed(0)}円</div>
${newMin?'<div class="update">🔥 今までで一番安い！</div>':''}
<div class="divider"></div>
<div class="small">
過去最安：${data.min?data.min.toFixed(0):"-"}円 ${data.minStore||""}<br>
過去最高：${data.max?data.max.toFixed(0):"-"}円 ${data.maxStore||""}
</div>
`
return
}

let v350=taxIn(parseFloat(p350.value))
if(!v350) return

let border=v350/350*500

let v500=taxIn(parseFloat(p500.value))

let comment=""
if(v500){

if(Math.abs(v500-border)<3){
comment=rand(draw)
}else if(v500<=border){
comment=rand(longWin)
}else{
comment=rand(shortWin)
}

comment=`<div class="comment">${comment}</div>`
}

let save=(cat!="その他" && item!="その他")

let key=cat+"_"+item
let data=JSON.parse(localStorage.getItem(key)||"{}")
let newMin=false

if(save){

if(!data.min || v350<data.min){
data.min=v350
data.minStore=store
newMin=true
}

if(!data.max || v350>data.max){
data.max=v350
data.maxStore=store
}

localStorage.setItem(key,JSON.stringify(data))
}

document.getElementById("result").innerHTML=`
<div class="small">${store} / ${cat}${item?(" / "+item):""}</div>
<div class="divider"></div>
<div class="main">${border.toFixed(0)}円以下なら<br>ロングの方がお得！</div>
${comment}
${newMin?'<div class="update">🔥 今までで一番安い！</div>':''}
<div class="divider"></div>
<div class="small">
過去最安：${data.min?data.min.toFixed(0):"-"}円 ${data.minStore||""}<br>
過去最高：${data.max?data.max.toFixed(0):"-"}円 ${data.maxStore||""}
</div>
`

}

</script>

</body>
</html>
